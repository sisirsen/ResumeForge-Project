<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Resume Forge AI</title>
    <link rel="icon" type="image/png" href="assets/icon (2).png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script type="module" src="js/main.js"></script>
</head>

<body class="bg-gray-50 font-sans">

    <div id="render-nav"></div>


    <!-- HERO SECTION -->
    <section class="flex flex-col items-center justify-center text-center px-6 py-24">

        <h2 class="text-5xl font-bold text-gray-800 leading-tight max-w-3xl">
            Build Professional Resumes <br> in Minutes
        </h2>

        <p class="mt-6 text-lg text-gray-600 text-semibold">
            Create job-winning resumes effortlessly using AI-powered templates.
            Customize, download, and get hired faster.
        </p>

        <div class="mt-8 flex space-x-4">
            
            <a href="createCV.html"><button class="px-8 py-3 font-semibold bg-gray-400 border border-black cursor-pointer rounded-full hover:bg-slate-700 hover:text-white transition">
               ➕ Create Resume
            </button></a> 

            <a href="./templates.html"><button class="px-8 py-3 font-semibold bg-gray-400 border border-black rounded-full cursor-pointer hover:bg-slate-700 hover:text-white transition">
                View Templates
            </button></a>
        </div>

    </section>



    <!-- TEMPLATES SECTION -->
    <section class="bg-white py-20 px-6">

        <!-- Section Heading -->
        <div class="text-center mb-14">
            <h2 class="text-4xl font-bold text-gray-900">
                Choose Your Resume Template
            </h2>
            <p class="text-gray-600 mt-4">
                Professionally designed templates to help you stand out.
            </p>
        </div>

        <!-- Template Grid -->
        <div id="render-templates" class="grid sm:grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 max-w-6xl mx-auto">
        </div>

    </section>
        <!-- FOOTER -->
    <footer>
            <div id="render-foot"></div>
    </footer>

</body>


</html>
